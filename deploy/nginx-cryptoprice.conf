# Nginx 配置文件 - cryptoprice.bithub.pro (HTTP only)
# 位置: /etc/nginx/sites-available/cryptoprice.bithub.pro

upstream gateway_backend {
    server 127.0.0.1:13012;
    keepalive 32;
}

# HTTP 配置
server {
    listen 80;
    listen [::]:80;
    server_name cryptoprice.bithub.pro;

    # 日志配置
    access_log /var/log/nginx/cryptoprice.access.log;
    error_log /var/log/nginx/cryptoprice.error.log;

    # 基本安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 反向代理到 Gateway 服务
    location / {
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        
        # 请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # 禁用代理重定向
        proxy_redirect off;
        
        # CORS 支持
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    }

    # 健康检查端点（不记录日志）
    location /health {
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        access_log off;
    }
}
